<script>
/* ==========================================================
   データ定義：カテゴリ → 関数 の2階層構造
   ========================================================== */
const categories = [
  { key:'agg',  label:'集計・計算' },
  { key:'cond', label:'条件分岐' },
  { key:'search', label:'検索・参照' },
  { key:'text', label:'文字列操作' },
  { key:'date', label:'日付・時刻' },
  { key:'round', label:'端数処理・書式' }
];

const functions = {

  /* ---------------- 集計・計算 ---------------- */
  sum: {
    cat:'agg', label:'合計 (SUM)', level:'初級',
    scene:'こんな時に：経費の合計、売上の月間集計',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、
      <span contenteditable class="blank" data-k="from">${v.from}</span> セルから
      <span contenteditable class="blank" data-k="to">${v.to}</span> セルまでの数字を
      全部足した結果を出したい。`,
    values: {target:'A1', from:'B1', to:'D1'},
    formula: (v) => `=SUM(${v.from}:${v.to})`,
    explain: (v) => `<b>SUM関数</b>は、指定した範囲のセルに入っている数値をすべて足し算します。<br>
      <b>SUM(${v.from}:${v.to})</b> は「${v.from}セルから${v.to}セルまでの合計」という意味です。結果は ${v.target} セルに入力してください。`,
    pitfall: `離れたセルも一緒に足したい場合は <b>SUM(B1,D1,F1)</b> のようにカンマ区切りでも指定できます。`,
    version: `Excel 2003以降、すべてのバージョンで使用できます。`
  },
  average: {
    cat:'agg', label:'平均 (AVERAGE)', level:'初級',
    scene:'こんな時に：テストの平均点、月ごとの平均売上',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、
      <span contenteditable class="blank" data-k="from">${v.from}</span> セルから
      <span contenteditable class="blank" data-k="to">${v.to}</span> セルまでの数字の
      平均を出したい。`,
    values: {target:'E1', from:'B1', to:'D1'},
    formula: (v) => `=AVERAGE(${v.from}:${v.to})`,
    explain: (v) => `<b>AVERAGE関数</b>は、指定した範囲の数値の平均値（合計 ÷ 個数）を計算します。`,
    pitfall: `空白セルは平均の計算から除外されますが、<b>「0」が入力されたセル</b>は計算に含まれてしまいます。空白のつもりが0扱いになっていないか要確認です。`,
    version: `Excel 2003以降、すべてのバージョンで使用できます。`
  },
  count: {
    cat:'agg', label:'個数 (COUNT/COUNTA)', level:'初級',
    scene:'こんな時に：提出済みの人数、データが入っている件数を数えたい',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、
      <span contenteditable class="blank" data-k="from">${v.from}</span> セルから
      <span contenteditable class="blank" data-k="to">${v.to}</span> セルまでの中で、
      <span contenteditable class="blank" data-k="mode" style="width:90px;">数字が入っている</span>
      セルの数を出したい。`,
    values: {target:'F1', from:'B1', to:'B10', mode:'数字が入っている'},
    formula: (v) => v.mode.includes('数字') ? `=COUNT(${v.from}:${v.to})` : `=COUNTA(${v.from}:${v.to})`,
    explain: (v) => `<b>COUNT関数</b>は数値が入っているセルだけを数え、<b>COUNTA関数</b>は文字も含めて「何か入力されているセル」を数えます。空欄の入力内容に応じてどちらかを自動で選んでいます。`,
    pitfall: `「人数を数えたい」だけだと迷いがちですが、<b>数字だけ数えるならCOUNT／文字も含めるならCOUNTA</b>と覚えてください。`,
    version: `Excel 2003以降、すべてのバージョンで使用できます。`
  },
  sumif: {
    cat:'agg', label:'条件付き合計 (SUMIF)', level:'中級',
    scene:'こんな時に：部署ごとの経費合計、担当者ごとの売上合計',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、
      <span contenteditable class="blank" data-k="condRange">${v.condRange}</span> の中で
      「<span contenteditable class="blank" data-k="cond" style="width:70px;">${v.cond}</span>」に一致する行だけを対象に、
      <span contenteditable class="blank" data-k="sumRange">${v.sumRange}</span> の数字を合計したい。`,
    values: {target:'E1', condRange:'B1:B10', cond:'営業部', sumRange:'C1:C10'},
    formula: (v) => `=SUMIF(${v.condRange},"${v.cond}",${v.sumRange})`,
    explain: (v) => `<b>SUMIF関数</b>は、条件に一致する行だけを対象に合計を出します。「条件を見る列（${v.condRange}）」と「合計する列（${v.sumRange}）」は行数を揃える必要があります。`,
    pitfall: `<b>「条件の範囲」と「合計する範囲」がズレる</b>のが一番の失敗パターンです。両方とも同じ行数・同じ開始行になっているか確認してください。`,
    version: `Excel 2003以降、すべてのバージョンで使用できます。`
  },
  subtotal: {
    cat:'agg', label:'フィルター対応合計 (SUBTOTAL)', level:'上級',
    scene:'こんな時に：フィルターをかけた後の合計を正しく出したい',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、
      フィルターで絞り込んだ状態でも正しく
      <span contenteditable class="blank" data-k="from">${v.from}</span> セルから
      <span contenteditable class="blank" data-k="to">${v.to}</span> セルの合計を出したい。`,
    values: {target:'D1', from:'B2', to:'B20'},
    formula: (v) => `=SUBTOTAL(109,${v.from}:${v.to})`,
    explain: (v) => `<b>SUBTOTAL関数</b>は、フィルターで非表示になった行を計算から除外できる集計関数です。「109」は合計を意味する集計方法番号です。`,
    pitfall: `普通の<b>SUM</b>だと、フィルターで非表示にした行の数字も合計に含まれてしまいます。フィルターをよく使う表には最初からSUBTOTALを使っておくのがおすすめです。`,
    version: `Excel 2003以降で使用できます。`
  },

  /* ---------------- 条件分岐 ---------------- */
  if: {
    cat:'cond', label:'条件で表示を変える (IF)', level:'初級',
    scene:'こんな時に：合格/不合格の判定、金額によって処理を分けたい',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルの数字が
      <span contenteditable class="blank" data-k="threshold">${v.threshold}</span>
      <span contenteditable class="blank" data-k="cmp" style="width:90px;">${v.cmp}</span>なら
      「<span contenteditable class="blank" data-k="yes" style="width:70px;">${v.yes}</span>」、
      そうでなければ
      「<span contenteditable class="blank" data-k="no" style="width:70px;">${v.no}</span>」
      と表示したい。`,
    values: {target:'C1', threshold:'80', cmp:'より大きい', yes:'合格', no:'不合格'},
    formula: (v) => {
      const opMap = {'より大きい':'>','以上':'>=','より小さい':'<','以下':'<=','と等しい':'='};
      const op = opMap[v.cmp] || '>';
      return `=IF(${v.target}${op}${v.threshold},"${v.yes}","${v.no}")`;
    },
    explain: (v) => `<b>IF関数</b>は「条件が正しければA、そうでなければB」を表示します。比較の言葉（より大きい／以上／より小さい／以下／と等しい）に応じて記号（&gt; &gt;= &lt; &lt;= =）が自動で変わります。`,
    pitfall: `「以上」と「より大きい」を混同すると、境界の数字（この例だと80ちょうど）の扱いが変わってしまいます。基準の数字を含めるかどうかを事前に確認してください。`,
    version: `Excel 2003以降、すべてのバージョンで使用できます。`
  },
  ifs: {
    cat:'cond', label:'3段階以上のランク分け (IFS)', level:'中級',
    scene:'こんな時に：A/B/C評価など、3段階以上のランク分け',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルの数字が
      <span contenteditable class="blank" data-k="t1">${v.t1}</span>以上なら「<span contenteditable class="blank" data-k="r1" style="width:50px;">${v.r1}</span>」、
      <span contenteditable class="blank" data-k="t2">${v.t2}</span>以上なら「<span contenteditable class="blank" data-k="r2" style="width:50px;">${v.r2}</span>」、
      それ以外なら「<span contenteditable class="blank" data-k="r3" style="width:50px;">${v.r3}</span>」と表示したい。`,
    values: {target:'C1', t1:'80', r1:'A', t2:'60', r2:'B', r3:'C'},
    formula: (v) => `=IFS(${v.target}>=${v.t1},"${v.r1}",${v.target}>=${v.t2},"${v.r2}",TRUE,"${v.r3}")`,
    explain: (v) => `<b>IFS関数</b>は、条件を上から順番に判定し、最初に一致した結果を返します。最後の「それ以外」は<b>TRUE</b>を条件にすることで「どれにも当てはまらなかった場合」を表現しています。`,
    pitfall: `IF関数を何個も入れ子にして数式が長くなり困っている場合は、このIFSに置き換えるとスッキリします。ただし<b>Excel 2019／365以降限定</b>の関数です。`,
    version: `Excel 2019またはMicrosoft 365が必要です（Excel 2016以前では使用できません）。`
  },
  iferror: {
    cat:'cond', label:'エラーを防ぐ (IFERROR)', level:'中級',
    scene:'こんな時に：割り算などでエラーが出て表が崩れるのを防ぎたい',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルの計算式
      「<span contenteditable class="blank" data-k="formula" style="width:110px;">${v.formula}</span>」
      でエラーが出たときは
      「<span contenteditable class="blank" data-k="fallback" style="width:60px;">${v.fallback}</span>」
      と表示し、エラーがなければ通常どおり計算結果を出したい。`,
    values: {target:'D1', formula:'B1/C1', fallback:'0'},
    formula: (v) => `=IFERROR(${v.formula},${isNaN(v.fallback) ? `"${v.fallback}"` : v.fallback})`,
    explain: (v) => `<b>IFERROR関数</b>は、既存の数式にそのまま被せて使う「保険」のような関数です。エラーが起きなければ普通に計算結果を表示し、エラーが起きたときだけ指定した表示に切り替わります。`,
    pitfall: `0で割り算をしてしまう（<b>#DIV/0!</b>エラー）ケースで特によく使われます。表示を空欄にしたい場合は、置き換える値の欄に何も入れず<b>""</b>にすると空白表示になります。`,
    version: `Excel 2007以降で使用できます。`

    explain: (v) => `<b>&（アンパサンド）</b>は文字列同士をつなげる記号です。「${v.a}&"${v.sep}"&${v.b}」は「${v.a}の文字＋区切り文字＋${v.b}の文字」を1つにつなげるという意味です。`,

    cat:'text', label:'文字を一部取り出す (LEFT/RIGHT)', level:'初級',

  },
  substitute: {

    pitfall: `全角ハイフン・半角ハイフン・長音記号など、見た目が似ている文字はコンピューター上では別の文字として扱われるため、意図通りに置き換わらないことがあります。`,

    formula: () => `=TODAY()`,

    version: `Excel 2003以降、すべてのバージョンで使用できます。`
  },
  datedif: {
    cat:'date', label:'期間を計算する (DATEDIF)', level:'中級',

    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、

    formula: (v) => {
      const unitMap = {'年':'Y', '月':'M', '日':'D'};

    explain: (v) => `<b>DATEDIF関数</b>は、2つの日付の間の期間を計算します。「Y」は満年数、「M」は満月数、「D」は日数です。指定した単位に応じて自動で切り替えています。`,
    pitfall: `関数名の候補として自動で出てこない（Excelの入力補完に表示されない）ため、名前を覚えて手入力する必要がある珍しい関数です。スペルミスに注意してください。`,
    version: `Excel 2003以降で使用できますが、公式のヘルプには載っていない裏技的な関数です。`
  },
  edate: {
    cat:'date', label:'〇ヶ月後の日付 (EDATE)', level:'中級',

    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、

    values: {target:'B1', source:'A1', months:'12'},
    formula: (v) => `=EDATE(${v.source},${v.months})`,
    explain: (v) => `<b>EDATE関数</b>は、指定した日付から〇ヶ月後（前）の日付を計算します。「前」にしたい場合はヶ月数にマイナスの数字（例：-1）を入力してください。`,
    pitfall: `計算結果が日付ではなく<b>ただの数字（シリアル値）</b>で表示されてしまう場合は、セルの書式設定を「日付」に変更してください。`,
    version: `Excel 2007以降で使用できます（Excel 2003では分析ツールアドインが必要です）。`
  },

  /* ---------------- 端数処理・書式 ---------------- */
  round: {
    cat:'round', label:'四捨五入する (ROUND)', level:'初級',
    scene:'こんな時に：消費税計算後の端数を四捨五入したい',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、
      <span contenteditable class="blank" data-k="source">${v.source}</span> セルの数値を
      小数第<span contenteditable class="blank" data-k="digit">${v.digit}</span>位で四捨五入したい。`,
    values: {target:'B1', source:'A1', digit:'0'},
    formula: (v) => `=ROUND(${v.source},${v.digit})`,
    explain: (v) => `<b>ROUND関数</b>は、指定した桁数で四捨五入します。桁数に「0」を指定すると整数に、「-1」を指定すると十の位で四捨五入になります。`,
    pitfall: `「小数第1位で四捨五入」と「小数第1位まで表示（見た目だけ変える）」は違います。ROUND関数は<b>実際の数値そのもの</b>を変えるので、後の計算にも影響します。`,
    version: `Excel 2003以降、すべてのバージョンで使用できます。`
  },
  roundupdown: {
    cat:'round', label:'切り上げ・切り捨て (ROUNDUP/ROUNDDOWN)', level:'初級',
    scene:'こんな時に：見積金額の端数を必ず切り上げたい／切り捨てたい',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、
      <span contenteditable class="blank" data-k="source">${v.source}</span> セルの数値を
      小数第<span contenteditable class="blank" data-k="digit">${v.digit}</span>位で
      <span contenteditable class="blank" data-k="mode" style="width:70px;">${v.mode}</span>したい。`,
    values: {target:'B1', source:'A1', digit:'0', mode:'切り上げ'},
    formula: (v) => v.mode.includes('上げ') ? `=ROUNDUP(${v.source},${v.digit})` : `=ROUNDDOWN(${v.source},${v.digit})`,

    pitfall: `見積書や請求書で「1円未満は必ず切り上げ」のような社内ルールがある場合、ROUND（四捨五入）ではなくROUNDUPを使う必要があるので使い分けに注意してください。`,
    version: `Excel 2003以降、すべてのバージョンで使用できます。`
  },
  texttostr: {
    cat:'round', label:'表示形式を変える (TEXT)', level:'中級',
    scene:'こんな時に：数字を「¥1,000」や「2026年1月」のような見た目にしたい',
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、

    values: {target:'B1', source:'A1', format:'#,##0"円"'},
    formula: (v) => `=TEXT(${v.source},"${v.format}")`,
    explain: (v) => `<b>TEXT関数</b>は、数値や日付を指定した書式の「文字列」に変換します。セルの表示形式を変えるのと似ていますが、TEXT関数は他の文字列と&でつなげて使えるのが特徴です。`,
    pitfall: `TEXT関数で変換した結果は<b>文字列</b>になるため、それ以上の計算（合計など）には使えなくなります。あくまで「表示専用」の値だと覚えておいてください。`,
    version: `Excel 2003以降、すべてのバージョンで使用できます。`
  }
};

/* ==========================================================
   状態管理・描画ロジック
   ========================================================== */
let currentCat = 'agg';
let currentFn = 'sum';

function renderCategoryRow(){
  const row = document.getElementById('categoryRow');
  row.innerHTML = '';
  categories.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'category-btn' + (c.key === currentCat ? ' active' : '');
    btn.textContent = c.label;
    btn.addEventListener('click', () => {
      currentCat = c.key;
      const firstFn = Object.keys(functions).find(k => functions[k].cat === currentCat);
      currentFn = firstFn;
      renderCategoryRow();
      renderFnRow();
      renderCard();
    });
    row.appendChild(btn);
  });
}

function renderFnRow(){
  const row = document.getElementById('fnRow');
  row.innerHTML = '';
  Object.keys(functions).filter(k => functions[k].cat === currentCat).forEach(key => {
    const f = functions[key];
    const btn = document.createElement('div');
    btn.className = 'fn-btn' + (key === currentFn ? ' active' : '');
    btn.innerHTML = `${f.label} <span class="lv">${f.level}</span>`;
    btn.addEventListener('click', () => {
      currentFn = key;
      renderFnRow();
      renderCard();
    });
    row.appendChild(btn);
  });
}

function renderCard(){
  const f = functions[currentFn];
  document.getElementById('sceneArea').textContent = f.scene;
  document.getElementById('sentenceArea').innerHTML = f.render(f.values);
  document.getElementById('versionNote').textContent = f.version;
  document.getElementById('mainCard').setAttribute('data-cellref', f.values.target);
  updateFormula();
  bindBlanks();
}

function updateFormula(){
  const f = functions[currentFn];
  document.getElementById('formulaOut').textContent = f.formula(f.values);
  document.getElementById('explainArea').innerHTML = f.explain(f.values);
  document.getElementById('pitfallArea').innerHTML = f.pitfall;
}

function bindBlanks(){
  document.querySelectorAll('.blank').forEach(el => {
    el.addEventListener('input', () => {
      const k = el.getAttribute('data-k');
      functions[currentFn].values[k] = el.textContent.trim();
      updateFormula();
    });
  });
}

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('formulaOut').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);

    if (typeof gtag === 'function') {
      gtag('event', 'copy_formula', { function_name: currentFn });
    }
  });
});

renderCategoryRow();
renderFnRow();
renderCard();
</script>
