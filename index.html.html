<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セルうめ｜穴埋めで関数がわかる</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F0;
    --ink:#20281F;
    --line:#D8D0BE;
    --forest:#2F6F5E;
    --forest-deep:#1E4A3E;
    --amber:#E8A33D;
    --cell-bg:#FFFFFF;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Shippori Mincho', serif;
    --sans: 'Noto Sans JP', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px),
      var(--paper);
    background-size: 28px 28px;
    background-position: -1px -1px;
    color:var(--ink);
    font-family:var(--sans);
    padding: 40px 20px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  header{margin-bottom:36px;}
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.14em;
    color:var(--forest-deep);
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .eyebrow::before{content:"fx";font-weight:700;background:var(--forest);color:#fff;padding:2px 6px;border-radius:3px;font-size:11px;}
  h1{
    font-family:var(--serif);
    font-weight:700;
    font-size:clamp(28px,5vw,40px);
    margin:10px 0 8px;
    line-height:1.3;
  }
  .sub{color:#5b6459;font-size:14.5px;line-height:1.7;max-width:52ch;}

  .card{
    background:var(--cell-bg);
    border:1px solid var(--line);
    border-radius:4px;
    box-shadow: 0 1px 0 var(--line);
    padding:28px;
    margin-bottom:22px;
    position:relative;
  }
  .card::before{
    content:attr(data-cellref);
    position:absolute;
    top:-11px;
    left:20px;
    background:var(--forest);
    color:#fff;
    font-family:var(--mono);
    font-size:11px;
    padding:2px 8px;
    border-radius:3px;
    letter-spacing:.05em;
  }

  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .tab{
    font-family:var(--mono);
    font-size:12.5px;
    padding:7px 12px;
    border:1px solid var(--line);
    border-radius:3px;
    background:var(--paper);
    cursor:pointer;
    color:var(--ink);
  }
  .tab.active{background:var(--forest);color:#fff;border-color:var(--forest);}

  .sentence{
    font-size:17px;
    line-height:2.4;
    font-family:var(--sans);
  }
  .blank{
    display:inline-block;
    width:56px;
    padding:3px 4px;
    border:none;
    border-bottom:2px solid var(--amber);
    background:#FFF8EA;
    font-family:var(--mono);
    font-size:14.5px;
    text-align:center;
    color:var(--forest-deep);
    font-weight:700;
  }
  .blank:focus{outline:none;border-bottom-color:var(--forest);background:#F0F7F3;}

  .divider{
    height:1px;
    background:repeating-linear-gradient(90deg, var(--line) 0 6px, transparent 6px 12px);
    margin:24px 0;
  }

  .output-label{
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:#8a8f80;
    text-transform:uppercase;margin-bottom:8px;
  }
  .output-row{display:flex;gap:10px;align-items:stretch;}
  .output-cell{
    flex:1;
    font-family:var(--mono);
    font-size:19px;
    font-weight:700;
    background:var(--forest-deep);
    color:#EAF3EE;
    padding:14px 16px;
    border-radius:3px;
    letter-spacing:.02em;
    overflow-x:auto;
    white-space:nowrap;
  }
  .copy-btn{
    font-family:var(--sans);
    font-size:13px;
    font-weight:700;
    background:var(--amber);
    color:#3A2A0A;
    border:none;
    border-radius:3px;
    padding:0 18px;
    cursor:pointer;
    white-space:nowrap;
  }
  .copy-btn:active{transform:translateY(1px);}
  .copy-btn.copied{background:var(--forest);color:#fff;}

  .explain{
    margin-top:20px;
    font-size:14px;
    line-height:1.85;
    color:#3c4438;
    background:#F5F2E8;
    border-left:3px solid var(--forest);
    padding:14px 16px;
    border-radius:0 3px 3px 0;
  }
  .explain b{color:var(--forest-deep);}

  .version-note{
    margin-top:14px;
    font-size:12.5px;
    font-family:var(--mono);
    color:#8a8f80;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .version-note .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);display:inline-block;}

  footer{
    text-align:center;
    font-size:12px;
    color:#9aa093;
    margin-top:40px;
    font-family:var(--mono);
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Formula Fill-in Prototype</div>
    <h1>虫食い文で、関数を組み立てる。</h1>
    <p class="sub">日本語の文章の空欄にセル番号を入れるだけで、Excelの数式が下に自動生成されます。関数の意味も一緒に確認できます。</p>
  </header>

  <div class="card" data-cellref="A1">
    <div class="tabs">
      <div class="tab active" data-fn="sum">合計 (SUM)</div>
      <div class="tab" data-fn="average">平均 (AVERAGE)</div>
      <div class="tab" data-fn="countif">条件付きカウント (COUNTIF)</div>
    </div>

    <div class="sentence" id="sentenceArea"></div>

    <div class="divider"></div>

    <div class="output-label">数式プレビュー</div>
    <div class="output-row">
      <div class="output-cell" id="formulaOut">=SUM(セルを入力)</div>
      <button class="copy-btn" id="copyBtn">コピー</button>
    </div>

    <div class="explain" id="explainArea"></div>

    <div class="version-note"><span class="dot"></span><span id="versionNote"></span></div>
  </div>

  <footer>PROTOTYPE — セルうめ β</footer>
</div>

<script>
const templates = {
  sum: {
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、
      <span contenteditable class="blank" data-k="from">${v.from}</span> セルから
      <span contenteditable class="blank" data-k="to">${v.to}</span> セルまでの
      合計を出す。`,
    values: {target:'A1', from:'B1', to:'D1'},
    formula: (v) => `=SUM(${v.from}:${v.to})`,
    explain: `<b>SUM関数</b>は、指定した範囲のセルに入っている数値をすべて足し算します。<br>
      <b>SUM(${'{from}'}:${'{to}'})</b> は「${'{from}'}セルから${'{to}'}セルまでの合計」という意味です。結果は ${'{target}'} セルに入力してください。`,
    version: `SUM関数はExcel 2003以降、すべてのバージョンで使用できます。`
  },
  average: {
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、
      <span contenteditable class="blank" data-k="from">${v.from}</span> セルから
      <span contenteditable class="blank" data-k="to">${v.to}</span> セルまでの
      平均を出す。`,
    values: {target:'E1', from:'B1', to:'D1'},
    formula: (v) => `=AVERAGE(${v.from}:${v.to})`,
    explain: `<b>AVERAGE関数</b>は、指定した範囲の数値の平均値（合計 ÷ 個数）を計算します。<br>
      空白セルは計算に含まれませんが、0が入力されたセルは含まれる点に注意してください。`,
    version: `AVERAGE関数はExcel 2003以降、すべてのバージョンで使用できます。`
  },
  countif: {
    render: (v) => `<span contenteditable class="blank" data-k="target">${v.target}</span> セルに、
      <span contenteditable class="blank" data-k="from">${v.from}</span> セルから
      <span contenteditable class="blank" data-k="to">${v.to}</span> セルの範囲で
      「<span contenteditable class="blank" data-k="cond" style="width:70px;">合格</span>」の数を数える。`,
    values: {target:'F1', from:'B1', to:'B10', cond:'合格'},
    formula: (v) => `=COUNTIF(${v.from}:${v.to},"${v.cond}")`,
    explain: `<b>COUNTIF関数</b>は、指定した範囲の中で、条件に一致するセルの数を数えます。<br>
      条件が文字列の場合は "" で囲む必要があります（数式では自動的に付与しています）。`,
    version: `COUNTIF関数はExcel 2003以降で使用できます。集計条件を複数指定したい場合はCOUNTIFS関数（Excel 2007以降）を使用してください。`
  }
};

let current = 'sum';

function renderCard(key){
  const t = templates[key];
  document.getElementById('sentenceArea').innerHTML = t.render(t.values);
  updateFormula();
  document.getElementById('versionNote').textContent = t.version;
  bindBlanks();
}

function updateFormula(){
  const t = templates[current];
  const formulaEl = document.getElementById('formulaOut');
  formulaEl.textContent = t.formula(t.values);

  let explainHtml = t.explain
    .replaceAll('{from}', t.values.from)
    .replaceAll('{to}', t.values.to)
    .replaceAll('{target}', t.values.target);
  document.getElementById('explainArea').innerHTML = explainHtml;
}

function bindBlanks(){
  document.querySelectorAll('.blank').forEach(el => {
    el.addEventListener('input', () => {
      const k = el.getAttribute('data-k');
      templates[current].values[k] = el.textContent.trim().toUpperCase() || el.textContent.trim();
      updateFormula();
    });
  });
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    tab.classList.add('active');
    current = tab.getAttribute('data-fn');
    document.querySelector('.card').setAttribute('data-cellref',
      current === 'sum' ? 'A1' : current === 'average' ? 'E1' : 'F1');
    renderCard(current);
  });
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('formulaOut').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);
  });
});

renderCard(current);
</script>
</body>
</html>
